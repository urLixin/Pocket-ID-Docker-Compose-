services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:next
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - /app/pocket-id
        - healthcheck
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - newt_proxy
networks:
  newt_proxy:
    external: true
